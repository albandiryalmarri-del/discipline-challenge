function getTodayKey(){return new Date().toISOString().slice(0,10);}
function getArabicDay(){return[“الأحد”,“الاثنين”,“الثلاثاء”,“الأربعاء”,“الخميس”,“الجمعة”,“السبت”][new Date().getDay()];}
function getStreak(h){let s=0;const t=new Date();for(let i=0;i<30;i++){const d=new Date(t);d.setDate(t.getDate()-i);const k=d.toISOString().slice(0,10);if(h[k]?.length>0)s++;else if(i>0)break;}return s;}
function getWeekKey(){const d=new Date();const jan=new Date(d.getFullYear(),0,1);const w=Math.ceil(((d-jan)/864e5+jan.getDay()+1)/7);return`${d.getFullYear()}-W${w}`;}
async function compressImage(file){return new Promise(res=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement(‘canvas’);const ratio=Math.min(700/img.width,700/img.height,1);c.width=img.width*ratio;c.height=img.height*ratio;c.getContext(‘2d’).drawImage(img,0,0,c.width,c.height);res(c.toDataURL(‘image/jpeg’,0.6));};img.src=e.target.result;};r.readAsDataURL(file);});}

// ── Card renderer ───────────────────────────────────────────────
function drawCard({userName,day,totalXP,streak,pct,doneCount,activeLen,phaseLabel,C,totalXPAll,history}){
const canvas=document.createElement(‘canvas’);
canvas.width=900;canvas.height=520;
const ctx=canvas.getContext(‘2d’);

// background
const bg=ctx.createLinearGradient(0,0,900,520);
bg.addColorStop(0,’#0d0d12’);bg.addColorStop(1,’#1a1a2e’);
ctx.fillStyle=bg;ctx.fillRect(0,0,900,520);

// top accent bar
const bar=ctx.createLinearGradient(0,0,900,0);
bar.addColorStop(0,C);bar.addColorStop(1,’#a855f7’);
ctx.fillStyle=bar;ctx.fillRect(0,0,900,6);

// subtle grid lines
ctx.strokeStyle=‘rgba(255,255,255,0.03)’;ctx.lineWidth=1;
for(let x=0;x<900;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,520);ctx.stroke();}
for(let y=0;y<520;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(900,y);ctx.stroke();}

// big background XP text
ctx.font=‘bold 200px Arial’;ctx.fillStyle=‘rgba(255,255,255,0.02)’;
ctx.textAlign=‘right’;ctx.fillText(`${Math.round((totalXP/totalXPAll)*100)}%`,880,420);

// title
ctx.textAlign=‘right’;
ctx.font=‘bold 17px Arial’;ctx.fillStyle=C;ctx.letterSpacing=‘3px’;
ctx.fillText(‘DISCIPLINE CHALLENGE’,860,55);
ctx.letterSpacing=‘0px’;

ctx.font=‘bold 44px Arial’;ctx.fillStyle=’#ffffff’;
ctx.fillText(‘تحدي الـ ١٤ يوم للانضباط’,860,115);

// name
ctx.font=‘bold 22px Arial’;ctx.fillStyle=‘rgba(255,255,255,0.6)’;
ctx.fillText(`يا ${userName} 👋`,860,155);

// divider
const div=ctx.createLinearGradient(40,0,860,0);
div.addColorStop(0,‘transparent’);div.addColorStop(0.3,C+‘99’);div.addColorStop(0.7,C+‘99’);div.addColorStop(1,‘transparent’);
ctx.strokeStyle=div;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(40,175);ctx.lineTo(860,175);ctx.stroke();

// stats boxes
const stats=[
{label:‘اليوم’,value:`${day}/١٤`,color:C},
{label:‘XP المكتسب’,value:String(totalXP),color:’#f59e0b’},
{label:‘Streak 🔥’,value:`${streak} يوم`,color:’#ef4444’},
{label:‘الإنجاز’,value:`${Math.round((totalXP/totalXPAll)*100)}٪`,color:’#10b981’},
];
stats.forEach((s,i)=>{
const bx=40+i*210,by=200;
// box bg
ctx.fillStyle=‘rgba(255,255,255,0.05)’;
roundRect(ctx,bx,by,190,110,14);ctx.fill();
// color top
ctx.fillStyle=s.color;
roundRect(ctx,bx,by,190,4,{tl:14,tr:14,bl:0,br:0});ctx.fill();
// value
ctx.font=‘bold 36px Arial’;ctx.fillStyle=s.color;ctx.textAlign=‘center’;
ctx.fillText(s.value,bx+95,by+68);
// label
ctx.font=‘15px Arial’;ctx.fillStyle=‘rgba(255,255,255,0.5)’;
ctx.fillText(s.label,bx+95,by+95);
});

// progress bar section
ctx.textAlign=‘right’;
ctx.font=‘bold 18px Arial’;ctx.fillStyle=‘rgba(255,255,255,0.7)’;
ctx.fillText(‘تقدم التحدي’,860,345);
// track
ctx.fillStyle=‘rgba(255,255,255,0.08)’;
roundRect(ctx,40,358,820,22,11);ctx.fill();
// fill
const fillW=Math.max(22,820*(totalXP/totalXPAll));
const grad=ctx.createLinearGradient(40,0,40+fillW,0);
grad.addColorStop(0,C);grad.addColorStop(1,’#a855f7’);
ctx.fillStyle=grad;
roundRect(ctx,40,358,fillW,22,11);ctx.fill();
// pct label
ctx.font=‘bold 13px Arial’;ctx.fillStyle=’#fff’;ctx.textAlign=‘left’;
ctx.fillText(`${Math.round((totalXP/totalXPAll)*100)}٪ مكتمل`,50,374);

// 14-day dots
ctx.textAlign=‘right’;
ctx.font=‘bold 15px Arial’;ctx.fillStyle=‘rgba(255,255,255,0.5)’;
ctx.fillText(‘مسار الأيام’,860,418);
const dotStart=40,dotY=440,dotSize=44,dotGap=16;
for(let i=0;i<14;i++){
const dy2=i+1;
const dx=dotStart+i*(dotSize+dotGap);
const pc=Object.entries(PHASES).filter(([k])=>parseInt(k)<=dy2).slice(-1)[0]?.[1]?.color||C;
const done=dy2<day;
const curr=dy2===day;
ctx.fillStyle=curr?pc:done?pc+‘88’:‘rgba(255,255,255,0.06)’;
roundRect(ctx,dx,dotY,dotSize,dotSize,10);ctx.fill();
if(curr){ctx.strokeStyle=pc;ctx.lineWidth=2;roundRect(ctx,dx,dotY,dotSize,dotSize,10);ctx.stroke();}
ctx.font=`bold ${curr?16:14}px Arial`;ctx.fillStyle=curr?’#000’:done?’#fff’:‘rgba(255,255,255,0.3)’;
ctx.textAlign=‘center’;ctx.fillText(String(dy2),dx+dotSize/2,dotY+dotSize/2+6);
}

// bottom text
ctx.textAlign=‘center’;
ctx.font=‘13px Arial’;ctx.fillStyle=‘rgba(255,255,255,0.2)’;
ctx.fillText(‘اللي ما يرتب نفسه الحياة ترتبه على مزاجها 🔥’,450,508);

return canvas.toDataURL(‘image/png’);
}

function roundRect(ctx,x,y,w,hh,r){
if(typeof r===‘number’)r={tl:r,tr:r,bl:r,br:r};
ctx.beginPath();
ctx.moveTo(x+r.tl,y);
ctx.lineTo(x+w-r.tr,y);ctx.arcTo(x+w,y,x+w,y+r.tr,r.tr);
ctx.lineTo(x+w,y+hh-r.br);ctx.arcTo(x+w,y+hh,x+w-r.br,y+hh,r.br);
ctx.lineTo(x+r.bl,y+hh);ctx.arcTo(x,y+hh,x,y+hh-r.bl,r.bl);
ctx.lineTo(x,y+r.tl);ctx.arcTo(x,y,x+r.tl,y,r.tl);
ctx.closePath();
}

const praiseTimer=useRef(null);

const todayKey=getTodayKey();

useEffect(()=>{
const d=loadLS();
if(!d.userName)return;
setUserName(d.userName||’’);setDay(d.day||1);setHistory(d.history||{});setTotalXP(d.totalXP||0);setPhotos(d.photos||{});
const ids=d.history?.[getTodayKey()]||[];setChecked(Object.fromEntries(ids.map(i=>[i,true])));
const dt=d.dailyTasks?.[getTodayKey()];
if(dt){setDailyTask(dt.task||’’);setDailyInput(dt.task||’’);setDailyDone(dt.done||false);}
const penalized=d.penalizedDays||[];
const yest=new Date();yest.setDate(yest.getDate()-1);const yKey=yest.toISOString().slice(0,10);
if((d.day||1)>1&&!penalized.includes(yKey)){
const yDone=(d.history?.[yKey]||[]).length;
if(yDone===0&&HABITS.filter(h=>h.day<=(d.day||1)).length>0){
const deduct=50,newXP=Math.max(0,(d.totalXP||0)-deduct);
setTotalXP(newXP);setPenalty({deduct,yKey});
saveLS({totalXP:newXP,penalizedDays:[…penalized,yKey]});
}
}
},[]);

const active=HABITS.filter(h=>h.day<=day);
const doneCount=active.filter(h=>checked[h.id]).length;
const xpAll=active.reduce((s,h)=>s+h.xp,0);
const pct=active.length?Math.round((doneCount/active.length)*100):0;
const streak=getStreak(history);
const phaseKey=Object.keys(PHASES).filter(k=>parseInt(k)<=day).slice(-1)[0]||‘1’;
const phase=PHASES[phaseKey];
const C=phase.color;
const totalXPAll=HABITS.reduce((s,h)=>s+h.xp,0);

const showPraise=(msg)=>{if(praiseTimer.current)clearTimeout(praiseTimer.current);setPraise(msg);praiseTimer.current=setTimeout(()=>setPraise(null),3500);};

const toggle=(habit)=>{
const now=!checked[habit.id];
const nc={…checked,[habit.id]:now};setChecked(nc);
const ids=Object.keys(nc).filter(k=>nc[k]);
const nh={…history,[todayKey]:ids};setHistory(nh);
const newXP=now?totalXP+habit.xp:Math.max(0,totalXP-habit.xp);setTotalXP(newXP);
saveLS({history:nh,totalXP:newXP});
if(now){showPraise(habit.praise);if(ids.length===active.length){setTimeout(()=>setCelebrate(true),400);setTimeout(()=>setCelebrate(false),5000);}}
};
